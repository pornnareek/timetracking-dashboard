<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Time Tracking Dashboard 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #f0f2f5;
  --surface:   #ffffff;
  --border:    #e2e5ec;
  --text:      #1a1d27;
  --muted:     #8b92a5;
  --ok:        #16a34a;
  --ok-bg:     #dcfce7;
  --warn:      #d97706;
  --warn-bg:   #fef3c7;
  --bad:       #dc2626;
  --bad-bg:    #fee2e2;
  --accent:    #4f46e5;
  --header-bg: #1e2235;
  --header-fg: #e8eaf0;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Sarabun',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}

/* ── TOP BAR ── */
.topbar{background:var(--header-bg);color:var(--header-fg);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.topbar-title{font-size:1rem;font-weight:700;letter-spacing:-.01em}
.topbar-title span{color:#818cf8}
.topbar-right{display:flex;align-items:center;gap:12px}
.last-updated{font-size:.72rem;color:#6b7280;font-family:'IBM Plex Mono',monospace}
.refresh-btn{background:#4f46e5;border:none;color:#fff;padding:6px 14px;border-radius:6px;font-size:.78rem;font-family:'Sarabun',sans-serif;cursor:pointer;display:flex;align-items:center;gap:6px;transition:.15s}
.refresh-btn:hover{background:#4338ca}
.refresh-btn:disabled{background:#374151;cursor:not-allowed}

/* ── MAIN ── */
.main{padding:20px 24px 60px;max-width:1400px;margin:0 auto}

/* ── SUMMARY CARDS ── */
.cards{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
@media(max-width:640px){.cards{grid-template-columns:repeat(2,1fr)}}
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px 18px;border-top:3px solid transparent}
.card.total{border-top-color:#6366f1}
.card.ok   {border-top-color:var(--ok)}
.card.warn {border-top-color:var(--warn)}
.card.bad  {border-top-color:var(--bad)}
.card-label{font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px;font-weight:600}
.card-value{font-size:2rem;font-weight:700;line-height:1}
.card.total .card-value{color:#4f46e5}
.card.ok    .card-value{color:var(--ok)}
.card.warn  .card-value{color:var(--warn)}
.card.bad   .card-value{color:var(--bad)}
.card-sub{font-size:.72rem;color:var(--muted);margin-top:4px}

/* ── SECTION TITLE ── */
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:8px}
.section-title{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted)}

/* ── DEPT SUMMARY ── */
.dept-cards{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px}
.dept-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 14px;min-width:120px;cursor:pointer;transition:.15s}
.dept-card:hover,.dept-card.active{border-color:var(--accent);box-shadow:0 0 0 3px rgba(79,70,229,.12)}
.dept-card.active{background:#eef2ff}
.dept-name{font-size:.75rem;font-weight:700;color:var(--text);margin-bottom:5px}
.dept-bars{display:flex;gap:3px;height:4px;border-radius:2px;overflow:hidden;margin-bottom:5px}
.dept-bar-ok  {background:var(--ok);flex:1}
.dept-bar-warn{background:var(--warn);flex:1}
.dept-bar-bad {background:var(--bad);flex:1}
.dept-counts{display:flex;gap:8px;font-size:.68rem}
.dept-counts .ok  {color:var(--ok)}
.dept-counts .warn{color:var(--warn)}
.dept-counts .bad {color:var(--bad)}

/* ── FILTERS ── */
.filter-row{display:flex;gap:10px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
.search-input{border:1px solid var(--border);background:var(--surface);padding:7px 12px;border-radius:7px;font-size:.82rem;font-family:'Sarabun',sans-serif;color:var(--text);outline:none;width:220px;transition:.15s}
.search-input:focus{border-color:var(--accent)}
.filter-count{font-size:.75rem;color:var(--muted)}

/* ── TABLE ── */
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.tbl-scroll{overflow-x:auto}
table{width:100%;border-collapse:collapse;min-width:800px}
thead tr{background:#f8f9fb;border-bottom:2px solid var(--border)}
th{padding:10px 14px;text-align:left;font-size:.67rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);white-space:nowrap;cursor:pointer;user-select:none}
th:hover{color:var(--text)}
th.num{text-align:right}
th.sorted-asc::after{content:" ↑"}
th.sorted-desc::after{content:" ↓"}
td{padding:9px 14px;border-bottom:1px solid var(--border);white-space:nowrap}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover td{background:#fafbff}
td.name-td{font-weight:600;color:var(--text);max-width:220px;overflow:hidden;text-overflow:ellipsis}
td.dept-td{font-weight:700;font-size:.75rem}
td.mono{font-family:'IBM Plex Mono',monospace;font-size:.76rem;text-align:right;color:#4b5563}
td.total-td{font-family:'IBM Plex Mono',monospace;font-size:.76rem;text-align:right;color:var(--text);font-weight:600}

/* ── DEPT COLORS ── */
.dept-BSS   {color:#2563eb}.dept-CCS{color:#7c3aed}
.dept-IFS   {color:#059669}.dept-ISD{color:#ea580c}
.dept-ISD-SA{color:#dc2626}.dept-PMD{color:#db2777}
.dept-SQA   {color:#0891b2}.dept-CAC{color:#ca8a04}
.dept-Other {color:#6b7280}

/* ── PCT BAR ── */
.pct-wrap{display:flex;align-items:center;gap:8px;justify-content:flex-end}
.pct-bar{width:72px;height:6px;background:#e5e7eb;border-radius:3px;overflow:hidden;flex-shrink:0}
.pct-fill{height:100%;border-radius:3px;transition:width .3s}
.pct-num{font-family:'IBM Plex Mono',monospace;font-size:.74rem;width:38px;text-align:right;font-weight:500}

/* ── STATUS BADGE ── */
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:.71rem;font-weight:700;white-space:nowrap}
.badge.ok  {background:var(--ok-bg);  color:var(--ok);  border:1px solid #bbf7d0}
.badge.warn{background:var(--warn-bg);color:var(--warn); border:1px solid #fde68a}
.badge.bad {background:var(--bad-bg); color:var(--bad);  border:1px solid #fecaca}

/* ── DEPT SUMMARY TABLE ── */
.dept-tbl-wrap{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:20px}
.dept-tbl-wrap table{min-width:unset}
.dept-tbl-wrap th,.dept-tbl-wrap td{padding:8px 14px}

/* ── LOADING / ERROR ── */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px;gap:14px;color:var(--muted)}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.error-box{background:#fff5f5;border:1px solid #fecaca;border-radius:10px;padding:20px;color:var(--bad);font-size:.9rem;max-width:500px;margin:40px auto}
.empty-row td{text-align:center;color:var(--muted);padding:32px}

/* ── GRAND TOTAL ROW ── */
.grand-total td{font-weight:700;background:#f8f9fb;font-family:'IBM Plex Mono',monospace;font-size:.76rem;text-align:right}
.grand-total td:first-child,.grand-total td:nth-child(2){font-family:'Sarabun',sans-serif;font-size:.82rem}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-title">📊 Time Tracking <span>Dashboard</span></div>
  <div class="topbar-right">
    <span class="last-updated" id="lastUpdated">—</span>
    <button class="refresh-btn" id="refreshBtn" onclick="loadData()">
      <span id="refreshIcon">↻</span> อัปเดต
    </button>
  </div>
</div>

<div class="main" id="main">
  <div class="loading"><div class="spinner"></div><span>กำลังโหลดข้อมูลจาก ClickUp...</span></div>
</div>

<script>
let raw = null;
let sortCol = null, sortDir = 1;
let activeDept = 'ALL', searchText = '';

async function loadData() {
  const btn = document.getElementById('refreshBtn');
  const icon = document.getElementById('refreshIcon');
  btn.disabled = true;
  icon.style.animation = 'spin .8s linear infinite';

  try {
    const res = await fetch('/api/data');
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    raw = data;
    render();
  } catch (e) {
    document.getElementById('main').innerHTML =
      `<div class="error-box">❌ ${e.message}</div>`;
  } finally {
    btn.disabled = false;
    icon.style.animation = '';
  }
}

function render() {
  const { persons, months, deptSummary, summary, targetDays, updatedAt } = raw;

  // อัปเดตเวลา
  document.getElementById('lastUpdated').textContent =
    'อัปเดต: ' + new Date(updatedAt).toLocaleString('th-TH');

  // filter + sort
  let filtered = persons.filter(p => {
    const dOk = activeDept === 'ALL' || p.dept === activeDept;
    const sOk = !searchText || p.name.toLowerCase().includes(searchText.toLowerCase());
    return dOk && sOk;
  });

  if (sortCol) {
    filtered = [...filtered].sort((a, b) => {
      let av = a[sortCol], bv = b[sortCol];
      if (sortCol === 'totalMs') { av = Number(av); bv = Number(bv); }
      if (typeof av === 'string') return av.localeCompare(bv) * sortDir;
      return (av - bv) * sortDir;
    });
  }

  // Grand total
  const grandMs = filtered.reduce((s, p) => s + (p.totalMs || 0), 0);
  const grandMonthly = {};
  for (const m of months) {
    grandMonthly[m] = filtered.reduce((s, p) => s + (p.monthly[m]?.ms || 0), 0);
  }

  const depts = ['ALL', ...Object.keys(deptSummary).sort()];
  const filteredSummary = {
    ok:   filtered.filter(p => p.status === 'ok').length,
    warn: filtered.filter(p => p.status === 'warn').length,
    bad:  filtered.filter(p => p.status === 'bad').length,
    total: filtered.length
  };

  document.getElementById('main').innerHTML = `
    <!-- SUMMARY CARDS -->
    <div class="cards">
      <div class="card total">
        <div class="card-label">พนักงานทั้งหมด</div>
        <div class="card-value">${summary.total}</div>
        <div class="card-sub">เป้า ${targetDays} วันทำงาน</div>
      </div>
      <div class="card ok">
        <div class="card-label">✅ ครบถ้วน (≥60%)</div>
        <div class="card-value">${summary.ok}</div>
        <div class="card-sub">${Math.round(summary.ok/summary.total*100)||0}% ของทีม</div>
      </div>
      <div class="card warn">
        <div class="card-label">⚠️ ลงไม่ครบ (30-59%)</div>
        <div class="card-value">${summary.warn}</div>
        <div class="card-sub">${Math.round(summary.warn/summary.total*100)||0}% ของทีม</div>
      </div>
      <div class="card bad">
        <div class="card-label">❌ ลงน้อยมาก (&lt;30%)</div>
        <div class="card-value">${summary.bad}</div>
        <div class="card-sub">${Math.round(summary.bad/summary.total*100)||0}% ของทีม</div>
      </div>
    </div>

    <!-- DEPT SUMMARY TABLE -->
    <div class="section-header"><span class="section-title">สรุปรายแผนก</span></div>
    <div class="dept-tbl-wrap" style="margin-bottom:20px">
      <div class="tbl-scroll">
        <table>
          <thead><tr>
            <th>แผนก</th><th class="num">ทั้งหมด</th>
            <th class="num" style="color:var(--ok)">✅ ครบ</th>
            <th class="num" style="color:var(--warn)">⚠️ ไม่ครบ</th>
            <th class="num" style="color:var(--bad)">❌ น้อยมาก</th>
            <th class="num">% ครบ</th>
          </tr></thead>
          <tbody>
            ${Object.entries(deptSummary).sort().map(([d,s]) => `
              <tr>
                <td class="dept-td dept-${d}">${d}</td>
                <td class="mono">${s.total}</td>
                <td class="mono" style="color:var(--ok)">${s.ok}</td>
                <td class="mono" style="color:var(--warn)">${s.warn}</td>
                <td class="mono" style="color:var(--bad)">${s.bad}</td>
                <td class="mono">${Math.round(s.ok/s.total*100)||0}%</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>

    <!-- FILTER -->
    <div class="section-header">
      <span class="section-title">รายบุคคล</span>
      <div class="filter-row" style="margin-bottom:0">
        <input class="search-input" type="text" placeholder="🔍 ค้นหาชื่อ..."
          value="${searchText}" oninput="setSearch(this.value)">
        <div style="display:flex;gap:6px;flex-wrap:wrap">
          ${depts.map(d => `<button class="badge ${d===activeDept?'ok':''}${d==='ALL'&&activeDept==='ALL'?'ok':''}"
            style="${d===activeDept?'':'background:#f3f4f6;border-color:#e5e7eb;color:#6b7280'};cursor:pointer;border:1px solid"
            onclick="setDept('${d}')">${d} ${d!=='ALL'&&deptSummary[d]?`(${deptSummary[d].total})`:''}
          </button>`).join('')}
        </div>
        <span class="filter-count">แสดง ${filtered.length} คน</span>
      </div>
    </div>

    <!-- MAIN TABLE -->
    <div style="margin-top:10px" class="table-wrap">
      <div class="tbl-scroll">
        <table>
          <thead>
            <tr>
              <th onclick="setSort('name')">ชื่อพนักงาน</th>
              <th onclick="setSort('dept')">แผนก</th>
              ${months.map(m => `<th class="num">${thMonth(m)}</th>`).join('')}
              <th class="num" onclick="setSort('totalMs')">รวม</th>
              <th class="num" onclick="setSort('pct')">% ครบ</th>
              <th onclick="setSort('status')">สถานะ</th>
            </tr>
          </thead>
          <tbody>
            ${filtered.length === 0
              ? `<tr class="empty-row"><td colspan="${4+months.length}">ไม่พบข้อมูล</td></tr>`
              : filtered.map(p => {
                  const c = p.status==='ok'?'var(--ok)':p.status==='warn'?'var(--warn)':'var(--bad)';
                  const lb = p.status==='ok'?'✅ ครบ':p.status==='warn'?'⚠️ ไม่ครบ':'❌ น้อยมาก';
                  return `<tr>
                    <td class="name-td" title="${p.name}">${p.name}</td>
                    <td class="dept-td dept-${p.dept}">${p.dept}</td>
                    ${months.map(m=>`<td class="mono">${p.monthly[m]?.display||'0 d 00 h 00 m'}</td>`).join('')}
                    <td class="total-td">${p.total}</td>
                    <td>
                      <div class="pct-wrap">
                        <div class="pct-bar"><div class="pct-fill" style="width:${Math.min(p.pct,100)}%;background:${c}"></div></div>
                        <span class="pct-num" style="color:${c}">${p.pct}%</span>
                      </div>
                    </td>
                    <td><span class="badge ${p.status}">${lb}</span></td>
                  </tr>`;
                }).join('')
            }
            <!-- Grand Total -->
            <tr class="grand-total">
              <td colspan="2">📊 Grand Total (${filtered.length} คน)</td>
              ${months.map(m=>`<td>${fmtMs(grandMonthly[m])}</td>`).join('')}
              <td>${fmtMs(grandMs)}</td>
              <td colspan="2"></td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- NOTE -->
    <div style="margin-top:12px;font-size:.72rem;color:var(--muted);line-height:1.8">
      📝 หมายเหตุ: 1 day = 8 hours &nbsp;·&nbsp; เกณฑ์ ✅ ≥60% &nbsp;·&nbsp; ⚠️ 30-59% &nbsp;·&nbsp; ❌ &lt;30% &nbsp;·&nbsp; เป้าหมาย ${targetDays} วัน
    </div>
  `;
}

function fmtMs(ms) {
  if (!ms) return '0 d 00 h 00 m';
  const h = ms / 3600000, d = Math.floor(h / 8);
  const rh = Math.floor(h % 8), rm = Math.floor((h % 1) * 60);
  return `${d} d ${String(rh).padStart(2,'0')} h ${String(rm).padStart(2,'0')} m`;
}

function thMonth(m) {
  const map = {'Jan':'ม.ค.','Feb':'ก.พ.','Mar':'มี.ค.','Apr':'เม.ย.',
               'May':'พ.ค.','Jun':'มิ.ย.','Jul':'ก.ค.','Aug':'ส.ค.',
               'Sep':'ก.ย.','Oct':'ต.ค.','Nov':'พ.ย.','Dec':'ธ.ค.'};
  const [mon, yr] = m.split(' ');
  return `${map[mon]||mon}/${String(yr).slice(2)}`;
}

function setDept(d) { activeDept = d; render(); }
function setSearch(v) { searchText = v; render(); }
function setSort(col) {
  if (sortCol === col) sortDir *= -1; else { sortCol = col; sortDir = 1; }
  render();
}

loadData();
</script>
</body>
</html>
