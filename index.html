<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Time Tracking Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#0f2547;--navy2:#1a3a6b;--accent:#3b82f6;--accent2:#60a5fa;
  --ok:#059669;--ok-bg:#d1fae5;--ok-border:#6ee7b7;
  --warn:#d97706;--warn-bg:#fef3c7;--warn-border:#fcd34d;
  --bad:#dc2626;--bad-bg:#fee2e2;--bad-border:#fca5a5;
  --bg:#f1f5f9;--surface:#fff;--border:#e2e8f0;--text:#1e293b;--muted:#64748b;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Sarabun',sans-serif;background:var(--bg);color:var(--text);font-size:13px;min-height:100vh}

/* TOP BAR */
.topbar{background:linear-gradient(135deg,var(--navy) 0%,var(--navy2) 100%);height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(15,37,71,.4)}
.topbar-left{display:flex;align-items:center;gap:12px}
.logo{width:32px;height:32px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px}
.topbar-title{font-size:1rem;font-weight:700;color:#fff;letter-spacing:-.01em}
.topbar-title span{color:var(--accent2)}
.topbar-right{display:flex;align-items:center;gap:10px}
.updated{font-size:.68rem;color:rgba(255,255,255,.5);font-family:'IBM Plex Mono',monospace}
.refresh-btn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;padding:6px 16px;border-radius:6px;font-size:.78rem;font-family:'Sarabun',sans-serif;cursor:pointer;transition:.15s;font-weight:500}
.refresh-btn:hover{background:rgba(255,255,255,.2)}
.refresh-btn:disabled{opacity:.4;cursor:not-allowed}

/* TABS */
.tabs{background:var(--navy);padding:0 24px;display:flex;gap:2px;border-bottom:1px solid rgba(255,255,255,.1)}
.tab{padding:11px 22px;font-size:.82rem;font-weight:600;cursor:pointer;color:rgba(255,255,255,.5);border-bottom:3px solid transparent;transition:.15s;margin-bottom:-1px}
.tab:hover{color:rgba(255,255,255,.8)}
.tab.active{color:#fff;border-bottom-color:var(--accent2)}

/* MAIN */
.main{padding:20px 24px 60px;max-width:1500px;margin:0 auto}

/* FILTER BAR */
.filter-bar{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 18px;margin-bottom:16px;display:flex;flex-wrap:wrap;gap:12px;align-items:flex-end;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.filter-group{display:flex;flex-direction:column;gap:4px}
.filter-label{font-size:.66rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.07em}
.filter-select{border:1.5px solid var(--border);border-radius:7px;padding:6px 10px;font-size:.8rem;font-family:'Sarabun',sans-serif;color:var(--text);background:var(--surface);min-width:130px;outline:none;cursor:pointer;transition:.15s}
.filter-select:focus{border-color:var(--accent)}
.filter-input{border:1.5px solid var(--border);border-radius:7px;padding:6px 10px;font-size:.8rem;font-family:'Sarabun',sans-serif;color:var(--text);min-width:190px;outline:none;transition:.15s}
.filter-input:focus{border-color:var(--accent)}
.filter-count{font-size:.75rem;color:var(--muted);align-self:center;background:#f8fafc;padding:4px 10px;border-radius:20px;border:1px solid var(--border)}

/* CARDS */
.cards{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
@media(max-width:640px){.cards{grid-template-columns:repeat(2,1fr)}}
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px 18px;position:relative;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06);transition:.2s}
.card:hover{box-shadow:0 4px 12px rgba(0,0,0,.1);transform:translateY(-1px)}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.card.total::before{background:linear-gradient(90deg,var(--accent),var(--accent2))}
.card.ok::before{background:linear-gradient(90deg,var(--ok),#34d399)}
.card.warn::before{background:linear-gradient(90deg,var(--warn),#fbbf24)}
.card.bad::before{background:linear-gradient(90deg,var(--bad),#f87171)}
.card-label{font-size:.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px;font-weight:700}
.card-value{font-size:2rem;font-weight:700;line-height:1;margin-bottom:4px}
.card.total .card-value{color:var(--accent)}
.card.ok .card-value{color:var(--ok)}
.card.warn .card-value{color:var(--warn)}
.card.bad .card-value{color:var(--bad)}
.card-sub{font-size:.71rem;color:var(--muted)}

/* TABLE WRAPPER */
.tbl-wrap{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.tbl-scroll{overflow-x:auto}
table{width:100%;border-collapse:collapse;min-width:720px}

/* TABLE HEADER - ROW 1 (group labels) */
thead tr:first-child{background:var(--navy)}
thead tr:first-child th{color:rgba(255,255,255,.85);font-size:.67rem;padding:8px 12px;text-align:center;font-weight:600;letter-spacing:.05em;white-space:nowrap}

/* TABLE HEADER - ROW 2 (column names) */
thead tr:nth-child(2) th{background:#f8fafc;color:var(--muted);font-size:.66rem;font-weight:700;padding:8px 12px;border-bottom:2px solid var(--border);white-space:nowrap;cursor:pointer;text-transform:uppercase;letter-spacing:.05em;transition:.15s}
thead tr:nth-child(2) th:hover{background:#f1f5f9;color:var(--text)}
th.num,td.num{text-align:right}

/* TABLE BODY */
td{padding:8px 12px;border-bottom:1px solid #f1f5f9;font-size:.78rem;white-space:nowrap;transition:.1s}
tbody tr:hover td{background:#f8faff}
tbody tr:last-child td{border-bottom:none}
td.name-td{font-weight:600;max-width:220px;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
td.dept-td{text-align:center}
td.mono{font-family:'IBM Plex Mono',monospace;font-size:.73rem;text-align:right;color:#475569}
td.total-td{font-family:'IBM Plex Mono',monospace;font-size:.73rem;text-align:right;font-weight:700;color:var(--text)}

/* DEPT TAGS */
.dept-tag{display:inline-block;padding:3px 9px;border-radius:20px;font-size:.7rem;font-weight:700}
.dept-BSS{color:#1d4ed8;background:#dbeafe}
.dept-CCS{color:#6d28d9;background:#ede9fe}
.dept-IFS{color:#065f46;background:#d1fae5}
.dept-ISD{color:#9a3412;background:#ffedd5}
.dept-ISD-SA{color:#991b1b;background:#fee2e2}
.dept-PMD{color:#831843;background:#fce7f3}
.dept-SQA{color:#0e7490;background:#cffafe}
.dept-CAC{color:#92400e;background:#fef3c7}
.dept-Other{color:#475569;background:#f1f5f9}

/* PCT BAR */
.pct-wrap{display:flex;align-items:center;gap:7px;justify-content:flex-end}
.pct-bar{width:60px;height:6px;background:#e2e8f0;border-radius:3px;overflow:hidden;flex-shrink:0}
.pct-fill{height:100%;border-radius:3px;transition:width .4s}
.pct-num{font-family:'IBM Plex Mono',monospace;font-size:.71rem;width:36px;text-align:right;font-weight:600}

/* BADGE */
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:.7rem;font-weight:700;white-space:nowrap}
.badge.ok{background:var(--ok-bg);color:var(--ok);border:1px solid var(--ok-border)}
.badge.warn{background:var(--warn-bg);color:var(--warn);border:1px solid var(--warn-border)}
.badge.bad{background:var(--bad-bg);color:var(--bad);border:1px solid var(--bad-border)}

/* GRAND TOTAL */
.grand-total td{background:#f0f7ff;font-weight:700;border-top:2px solid var(--border)}
.grand-total td.mono,.grand-total td.total-td{font-family:'IBM Plex Mono',monospace;font-size:.73rem;text-align:right;color:var(--navy)}
.grand-total td:first-child,.grand-total td:nth-child(2){font-family:'Sarabun',sans-serif;font-size:.8rem;font-weight:700;color:var(--navy);text-align:left}

/* LOADING/ERROR */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px;gap:14px;color:var(--muted)}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.error-box{background:#fff5f5;border:1px solid var(--bad-border);border-radius:10px;padding:20px;color:var(--bad);font-size:.9rem;max-width:500px;margin:40px auto}
.empty-row td{text-align:center;padding:32px;color:var(--muted)}
.note{margin-top:10px;font-size:.7rem;color:var(--muted);display:flex;gap:16px;flex-wrap:wrap}
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-left">
    <div class="logo">📊</div>
    <div class="topbar-title">Time Tracking <span>Dashboard</span></div>
  </div>
  <div class="topbar-right">
    <span class="updated" id="lastUpdated">—</span>
    <button class="refresh-btn" id="refreshBtn" onclick="loadData()">↻ รีเฟรช</button>
  </div>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('person')">👤 สรุปรายบุคคล</div>
  <div class="tab" onclick="switchTab('project')">📁 สรุปรายโปรเจค</div>
</div>

<div class="main" id="main">
  <div class="loading"><div class="spinner"></div><span>กำลังโหลดข้อมูลจาก ClickUp...</span></div>
</div>

<script>
let raw=null,activeTab='person';
let pYear='ALL',pDept='ALL',pStatus='ALL',pSearch='',pSort=null,pDir=1;
let rYear='ALL',rDept='ALL',rSearch='';

async function loadData(){
  const btn=document.getElementById('refreshBtn');
  btn.disabled=true;btn.textContent='⏳ กำลังโหลด...';
  try{
    const res=await fetch('/api/data');
    const data=await res.json();
    if(data.error)throw new Error(data.error);
    raw=data;
    document.getElementById('lastUpdated').textContent='อัปเดต: '+new Date(data.updatedAt).toLocaleString('th-TH');
    renderTab();
  }catch(e){
    document.getElementById('main').innerHTML=`<div class="error-box">❌ ${e.message}</div>`;
  }finally{btn.disabled=false;btn.textContent='↻ รีเฟรช';}
}

function switchTab(t){
  activeTab=t;
  document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('active',(i===0&&t==='person')||(i===1&&t==='project')));
  if(raw)renderTab();
}
function renderTab(){activeTab==='person'?renderPerson():renderProject();}

function renderPerson(){
  const{persons,months,years,deptSummary,summary}=raw;
  const depts=['ALL',...Object.keys(deptSummary).sort()];
  let filtered=persons.filter(p=>(pDept==='ALL'||p.dept===pDept)&&(pStatus==='ALL'||p.status===pStatus)&&(!pSearch||p.name.toLowerCase().includes(pSearch.toLowerCase()))).map(p=>{
    if(pYear==='ALL')return p;
    const yr=parseInt(pYear),yd=p.yearly[yr]||{ms:0,display:'0 d 00 h 00 m',pct:0,status:'bad'};
    const mths=months.filter(m=>m.endsWith(String(yr))),md={};
    for(const m of mths)md[m]=p.monthly[m]||{ms:0,display:'0 d 00 h 00 m'};
    return{...p,monthly:md,total:yd.display,totalMs:yd.ms,pct:yd.pct,status:yd.status};
  });
  if(pSort){filtered=[...filtered].sort((a,b)=>{let av=a[pSort],bv=b[pSort];if(pSort==='totalMs'){av=Number(av);bv=Number(bv);}return typeof av==='string'?av.localeCompare(bv)*pDir:(av-bv)*pDir;});}
  const sm=pYear==='ALL'?months:months.filter(m=>m.endsWith(pYear));
  const gMs=filtered.reduce((s,p)=>s+(p.totalMs||0),0);
  const gM={};for(const m of sm)gM[m]=filtered.reduce((s,p)=>s+(p.monthly[m]?.ms||0),0);
  const fs={ok:filtered.filter(p=>p.status==='ok').length,warn:filtered.filter(p=>p.status==='warn').length,bad:filtered.filter(p=>p.status==='bad').length};

  document.getElementById('main').innerHTML=`
    <div class="cards">
      <div class="card total"><div class="card-label">👥 พนักงานทั้งหมด</div><div class="card-value">${summary.total}</div><div class="card-sub">แสดง ${filtered.length} คน</div></div>
      <div class="card ok"><div class="card-label">✅ ครบถ้วน ≥60%</div><div class="card-value">${fs.ok}</div><div class="card-sub">${pct(fs.ok,filtered.length)}% ของที่แสดง</div></div>
      <div class="card warn"><div class="card-label">⚠️ ลงไม่ครบ 30-59%</div><div class="card-value">${fs.warn}</div><div class="card-sub">${pct(fs.warn,filtered.length)}% ของที่แสดง</div></div>
      <div class="card bad"><div class="card-label">❌ ลงน้อยมาก &lt;30%</div><div class="card-value">${fs.bad}</div><div class="card-sub">${pct(fs.bad,filtered.length)}% ของที่แสดง</div></div>
    </div>
    <div class="filter-bar">
      <div class="filter-group"><div class="filter-label">📅 ปี</div>
        <select class="filter-select" onchange="pYear=this.value;renderTab()">
          ${['ALL',...years.map(String)].map(y=>`<option value="${y}"${y===pYear?' selected':''}>${y==='ALL'?'ทุกปี':y}</option>`).join('')}
        </select></div>
      <div class="filter-group"><div class="filter-label">🏢 แผนก</div>
        <select class="filter-select" onchange="pDept=this.value;renderTab()">
          ${depts.map(d=>`<option value="${d}"${d===pDept?' selected':''}>${d==='ALL'?'ทุกแผนก':d}${d!=='ALL'?` (${deptSummary[d].total})`:''}</option>`).join('')}
        </select></div>
      <div class="filter-group"><div class="filter-label">🔖 สถานะ</div>
        <select class="filter-select" onchange="pStatus=this.value;renderTab()">
          <option value="ALL"${pStatus==='ALL'?' selected':''}>ทุกสถานะ</option>
          <option value="ok"${pStatus==='ok'?' selected':''}>✅ ครบ (≥60%)</option>
          <option value="warn"${pStatus==='warn'?' selected':''}>⚠️ ไม่ครบ (30-59%)</option>
          <option value="bad"${pStatus==='bad'?' selected':''}>❌ น้อยมาก (&lt;30%)</option>
        </select></div>
      <div class="filter-group"><div class="filter-label">🔍 ค้นหา</div>
        <input class="filter-input" type="text" placeholder="พิมพ์ชื่อพนักงาน..." value="${pSearch}" oninput="pSearch=this.value;renderTab()"></div>
      <span class="filter-count">แสดง ${filtered.length} / ${persons.length} คน</span>
    </div>
    <div class="tbl-wrap"><div class="tbl-scroll"><table>
      <thead>
        <tr>
          <th colspan="2">ข้อมูลพนักงาน</th>
          ${sm.length>0?`<th colspan="${sm.length}">Time Tracking รายเดือน</th>`:''}
          <th colspan="3">สรุป</th>
        </tr>
        <tr>
          <th onclick="srt('name')">ชื่อ-นามสกุล ${pSort==='name'?(pDir>0?'▲':'▼'):''}</th>
          <th onclick="srt('dept')" style="text-align:center">แผนก</th>
          ${sm.map(m=>`<th class="num">${thM(m)}</th>`).join('')}
          <th class="num" onclick="srt('totalMs')">รวม ${pSort==='totalMs'?(pDir>0?'▲':'▼'):''}</th>
          <th class="num" onclick="srt('pct')">% ครบ ${pSort==='pct'?(pDir>0?'▲':'▼'):''}</th>
          <th onclick="srt('status')">สถานะ</th>
        </tr>
      </thead>
      <tbody>
        ${filtered.length===0?`<tr class="empty-row"><td colspan="${4+sm.length}">ไม่พบข้อมูลที่ตรงกับเงื่อนไข</td></tr>`:
          filtered.map(p=>{const c=p.status==='ok'?'var(--ok)':p.status==='warn'?'var(--warn)':'var(--bad)';return`<tr>
            <td class="name-td" title="${p.name}">${p.name}</td>
            <td class="dept-td"><span class="dept-tag dept-${p.dept}">${p.dept}</span></td>
            ${sm.map(m=>`<td class="mono">${p.monthly[m]?.display||'—'}</td>`).join('')}
            <td class="total-td">${p.total}</td>
            <td><div class="pct-wrap"><div class="pct-bar"><div class="pct-fill" style="width:${Math.min(p.pct,100)}%;background:${c}"></div></div><span class="pct-num" style="color:${c}">${p.pct}%</span></div></td>
            <td><span class="badge ${p.status}">${p.status==='ok'?'✅ ครบ':p.status==='warn'?'⚠️ ไม่ครบ':'❌ น้อยมาก'}</span></td>
          </tr>`;}).join('')}
        <tr class="grand-total">
          <td colspan="2">📊 Grand Total (${filtered.length} คน)</td>
          ${sm.map(m=>`<td class="mono">${fD(gM[m])}</td>`).join('')}
          <td class="total-td">${fD(gMs)}</td><td colspan="2"></td>
        </tr>
      </tbody>
    </table></div></div>
    <div class="note">
      <span>📝 1 day = 8 hours</span>
      <span>✅ ครบ = ≥60%</span><span>⚠️ ไม่ครบ = 30–59%</span><span>❌ น้อยมาก = &lt;30%</span>
      <span>คลิกหัวคอลัมน์เพื่อเรียงลำดับ</span>
    </div>`;
}

function renderProject(){
  const{projects,years,deptSummary}=raw;
  const depts=['ALL',...Object.keys(deptSummary).sort()];
  let filtered=(projects||[]).filter(p=>(rDept==='ALL'||p.dept===rDept)&&(!rSearch||p.project.toLowerCase().includes(rSearch.toLowerCase())));
  const sy=rYear==='ALL'?years:[parseInt(rYear)];
  const gMs=filtered.reduce((s,p)=>s+(rYear==='ALL'?p.totalMs:(p.yearly[parseInt(rYear)]?.ms||0)),0);

  document.getElementById('main').innerHTML=`
    <div class="filter-bar">
      <div class="filter-group"><div class="filter-label">📅 ปี</div>
        <select class="filter-select" onchange="rYear=this.value;renderTab()">
          ${['ALL',...years.map(String)].map(y=>`<option value="${y}"${y===rYear?' selected':''}>${y==='ALL'?'ทุกปี':y}</option>`).join('')}
        </select></div>
      <div class="filter-group"><div class="filter-label">🏢 แผนก</div>
        <select class="filter-select" onchange="rDept=this.value;renderTab()">
          ${depts.map(d=>`<option value="${d}"${d===rDept?' selected':''}>${d==='ALL'?'ทุกแผนก':d}</option>`).join('')}
        </select></div>
      <div class="filter-group"><div class="filter-label">🔍 ค้นหาโปรเจค</div>
        <input class="filter-input" type="text" placeholder="ชื่อโปรเจค / List..." value="${rSearch}" oninput="rSearch=this.value;renderTab()"></div>
      <span class="filter-count">แสดง ${filtered.length} โปรเจค</span>
    </div>
    <div class="tbl-wrap"><div class="tbl-scroll"><table>
      <thead>
        <tr><th colspan="2">ข้อมูลโปรเจค</th>${sy.map(y=>`<th>ปี ${y}</th>`).join('')}<th>รวมทั้งหมด</th></tr>
        <tr>
          <th>ชื่อโปรเจค / List</th>
          <th style="text-align:center">แผนก</th>
          ${sy.map(y=>`<th class="num">${y}</th>`).join('')}
          <th class="num">รวม</th>
        </tr>
      </thead>
      <tbody>
        ${filtered.length===0?`<tr class="empty-row"><td colspan="${3+sy.length}">ไม่พบข้อมูล</td></tr>`:
          filtered.map(p=>`<tr>
            <td class="name-td" title="${p.project}">${p.project}</td>
            <td class="dept-td"><span class="dept-tag dept-${p.dept}">${p.dept}</span></td>
            ${sy.map(y=>`<td class="mono">${p.yearly[y]?.display||'—'}</td>`).join('')}
            <td class="total-td">${rYear==='ALL'?p.total:(p.yearly[parseInt(rYear)]?.display||'—')}</td>
          </tr>`).join('')}
        <tr class="grand-total">
          <td colspan="2">📊 Grand Total (${filtered.length} โปรเจค)</td>
          ${sy.map(y=>`<td class="mono">${fH(filtered.reduce((s,p)=>s+(p.yearly[y]?.ms||0),0))}</td>`).join('')}
          <td class="total-td">${fH(gMs)}</td>
        </tr>
      </tbody>
    </table></div></div>`;
}

function fD(ms){if(!ms)return'—';const h=ms/3600000,d=Math.floor(h/8),rh=Math.floor(h%8),rm=Math.floor((h%1)*60);return`${d}d ${String(rh).padStart(2,'0')}h ${String(rm).padStart(2,'0')}m`;}
function fH(ms){if(!ms)return'—';const h=ms/3600000,rh=Math.floor(h),rm=Math.floor((h%1)*60);return`${rh}h ${String(rm).padStart(2,'0')}m`;}
function thM(m){const map={'Jan':'ม.ค.','Feb':'ก.พ.','Mar':'มี.ค.','Apr':'เม.ย.','May':'พ.ค.','Jun':'มิ.ย.','Jul':'ก.ค.','Aug':'ส.ค.','Sep':'ก.ย.','Oct':'ต.ค.','Nov':'พ.ย.','Dec':'ธ.ค.'};const[mon,yr]=m.split(' ');return`${map[mon]||mon}/${String(yr).slice(2)}`;}
function pct(a,b){return Math.round(a/Math.max(b,1)*100);}
